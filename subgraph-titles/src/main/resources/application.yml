spring:
  application:
    name: subgraph-titles
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/imdb}

dgs:
  graphql:
    schema-locations: classpath:schema/**
    federation:
      enabled: true

omdb:
  api-key: ${OMDB_API_KEY:}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
